<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>TV agus!</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%234A3AA8%22/><text x=%2250%22 y=%2266%22 font-size=%2255%22 text-anchor=%22middle%22 fill=%22%23FFFFFF%22 font-family=%22Arial%22>tv</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --bg: #EFEFF2;
    --surface: #FFFFFF;
    --surface-2: #E7E7EC;
    --ink: #16161D;
    --ink-soft: #8B8B96;
    --line: #E2E2E8;
    --accent: #4A3AA8;
    --accent-ink: #FFFFFF;
    --gold: #FFB020;
    --teal: #1FBF83;
    --amber-bg: #FFF3DC;
    --danger: #FF4757;
    --radius: 14px;
    --radius-lg: 18px;
    --shadow: 0 1px 2px rgba(20,20,30,0.05), 0 4px 14px rgba(20,20,30,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;width:100%;overflow-x:hidden;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:84px;
  }
  h1,h2,h3,.display{
    font-family:'Inter',system-ui,sans-serif;
    font-weight:800;
    letter-spacing:-0.02em;
    margin:0;
  }
  .mono{font-family:'Inter',sans-serif;font-weight:700;}
  button{font-family:inherit;}
  a{color:inherit;}
  #app{max-width:640px;margin:0 auto;min-height:100vh;position:relative;}
  .topbar{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(135deg,#4A3AA8,#6B54D6);
    padding:22px 18px 20px;
    display:flex;align-items:center;justify-content:center;position:relative;
  }
  .topbar h1{font-size:19px;display:flex;align-items:center;gap:7px;font-weight:800;color:#fff;letter-spacing:.01em;}
  .topbar .bulb{display:none;}
  .topbar .icon-btn{position:absolute;right:18px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.18);color:#fff;}
  .icon-btn{
    border:none;background:var(--surface-2);width:38px;height:38px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;
  }
  .icon-btn:active{transform:scale(0.94);}
  .content{padding:16px 16px 32px;}
  .bottomnav{
    position:fixed;bottom:0;left:0;right:0;z-index:30;
    background:rgba(255,255,255,0.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);
    display:flex;justify-content:space-around;padding:10px 6px calc(10px + env(safe-area-inset-bottom));
    max-width:640px;margin:0 auto;
  }
  .navbtn{
    background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--ink-soft);font-size:11px;font-weight:600;cursor:pointer;padding:4px 14px;border-radius:12px;
  }
  .navbtn.active{color:var(--accent);}
  .navbtn .ic{display:block;margin:0 auto;}
  .login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
  .login-wrap .display{font-size:32px;margin-bottom:6px;font-weight:900;}
  .login-wrap .sub{color:var(--ink-soft);margin-bottom:26px;font-size:14px;font-weight:500;}
  .pin-input{
    font-family:'Inter',sans-serif;font-weight:800;font-size:28px;letter-spacing:12px;text-align:center;
    width:240px;padding:16px 10px 16px 22px;border-radius:16px;border:2px solid var(--line);
    background:var(--surface-2);margin-bottom:18px;color:var(--ink);
  }
  .pin-input:focus{outline:none;border-color:var(--accent);background:var(--surface);}
  .primary-btn{
    background:var(--accent);color:var(--accent-ink);border:none;border-radius:14px;
    padding:15px 30px;font-size:15px;font-weight:700;cursor:pointer;
  }
  .primary-btn:active{transform:scale(0.98);}
  .primary-btn[disabled]{opacity:.5;cursor:default;}
  .ghost-btn{
    background:var(--surface-2);border:none;border-radius:14px;padding:12px 22px;
    font-size:14px;font-weight:700;cursor:pointer;color:var(--ink);
  }
  .error-text{color:var(--danger);font-size:13px;margin-top:8px;min-height:18px;font-weight:600;}
  .marquee-label{
    display:flex;justify-content:center;margin:22px 0 14px;
  }
  .marquee-label:first-child{margin-top:0;}
  .marquee-label span{
    background:var(--surface-2);color:var(--ink-soft);font-size:12px;font-weight:800;
    letter-spacing:.04em;text-transform:uppercase;padding:8px 18px;border-radius:999px;
  }
  .toptabs{
    display:flex;gap:0;border-bottom:1px solid var(--line);margin:-16px -16px 16px;padding:0 16px;
    position:sticky;top:66px;z-index:15;background:var(--bg);
  }
  .toptab{
    flex:1;text-align:center;padding:12px 4px 13px;font-size:13px;font-weight:800;letter-spacing:.04em;
    text-transform:uppercase;color:var(--ink-soft);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;
  }
  .toptab.active{color:var(--ink);border-bottom-color:var(--ink);}
  .season-progress{height:3px;background:var(--surface-2);overflow:hidden;margin:0 0 0;}
  .season-progress .fill{height:100%;background:var(--teal);}
  .ticket{
    background:var(--surface);border-radius:0;box-shadow:var(--shadow);
    display:flex;overflow:hidden;position:relative;
    margin:0 0 12px;padding:0;
  }
  .ticket .poster{width:84px;min-width:84px;align-self:stretch;border-radius:0;background:var(--surface-2);object-fit:cover;}
  .ticket .poster-ph{width:84px;min-width:84px;align-self:stretch;border-radius:0;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:10px;text-align:center;}
  .ticket .perf{display:none;}
  .ticket .body{flex:1;padding:12px 12px;min-width:0;}
  .ticket .check{margin:auto 12px auto 0;}
  .ticket .name-pill{
    display:inline-flex;align-items:center;gap:4px;border:1.5px solid var(--ink);border-radius:999px;
    padding:6px 12px;font-weight:800;font-size:13px;margin-bottom:10px;max-width:100%;
  }
  .ticket .name-pill span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ticket .name{font-weight:800;font-size:14.5px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ticket .ep-code{font-weight:800;font-size:17px;color:var(--ink);}
  .ticket .ep-title{font-size:14px;color:var(--ink);margin-top:2px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ticket .pending{font-size:11.5px;color:var(--ink-soft);margin-top:6px;}
  .ticket .premiere-tag{
    display:inline-block;background:var(--ink);color:#fff;font-size:11px;font-weight:800;
    letter-spacing:.03em;padding:5px 10px;border-radius:6px;margin-top:10px;
  }
  .ticket .check{
    width:32px;height:32px;border-radius:50%;border:none;background:var(--surface-2);
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
    font-size:15px;color:var(--ink-soft);transition:.15s;
  }
  .ticket .check:active{transform:scale(0.9);}
  .ticket .check.done{background:var(--teal);color:#fff;}
  .ticket.uptodate .body .ep-code{color:var(--gold);}
  .ticket .uptodate-tag{font-size:12px;color:var(--gold);font-weight:800;}
  .empty-state{text-align:center;padding:48px 20px;color:var(--ink-soft);}
  .empty-state .display{font-size:19px;color:var(--ink);margin-bottom:6px;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .grid-card{border-radius:0;overflow:hidden;position:relative;aspect-ratio:2/3;background:var(--surface-2);cursor:pointer;}
  .grid-card img{width:100%;height:100%;object-fit:cover;display:block;}
  .grid-card .no-img{display:flex;align-items:center;justify-content:center;height:100%;font-size:11px;color:var(--ink-soft);text-align:center;padding:8px;}
  .grid-card .statusbar{position:absolute;bottom:0;left:0;right:0;height:5px;}
  .st-green{background:#3FB871;}
  .st-yellow{background:#E8B923;}
  .st-gray{background:#9AA0A6;}
  .st-purple{background:#7B4FB0;}
  .st-red{background:#C0392B;}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .chip{
    border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:6px 13px;
    font-size:12.5px;cursor:pointer;color:var(--ink-soft);font-weight:600;
  }
  .chip.active{background:var(--ink);color:var(--surface);border-color:var(--ink);}
  .detail-hero{
    height:280px;background-size:cover;background-position:center;
    position:relative;margin:0 -16px 0;display:flex;align-items:flex-end;overflow:hidden;
  }
  .detail-hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 40%,rgba(20,18,15,.75));}
  .detail-hero .info{position:relative;padding:16px;color:#fff;z-index:1;}
  .detail-hero .info h2{font-size:24px;color:#fff;}
  .detail-hero .info .meta{font-size:13px;opacity:.85;margin-top:2px;}
  .back-chevron{
    background:none;border:none;font-size:22px;font-weight:700;color:var(--ink);
    padding:8px 4px;cursor:pointer;margin-bottom:6px;
  }
  .overall-progress{height:4px;background:var(--surface-2);margin:0 -16px 20px;}
  .overall-progress .fill{height:100%;background:var(--ink);}
  .status-select{
    width:100%;padding:12px 4px;border:none;border-bottom:1px solid var(--line);background:none;
    font-size:16px;font-weight:700;margin-bottom:16px;color:var(--ink);
  }
  .season-row{
    background:var(--surface);border-radius:12px;padding:13px 14px;margin-bottom:0;
    display:flex;align-items:center;justify-content:space-between;cursor:pointer;
  }
  .season-row .left{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;}
  .season-row .count{font-size:12.5px;color:var(--ink-soft);font-weight:600;}
  .season-row .mark-all{
    width:36px;height:36px;border-radius:50%;border:none;background:var(--surface-2);color:var(--ink-soft);
    display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;
  }
  .season-row.complete .mark-all{background:var(--teal);color:#fff;}
  .season-row.complete{}
  .episode-row{
    display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line);
  }
  .episode-row img{width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surface-2);}
  .episode-row .ecode{font-weight:800;font-size:11.5px;color:var(--ink-soft);width:46px;flex-shrink:0;line-height:1.3;}
  .episode-row .etitle{flex:1;font-size:13.5px;font-weight:500;min-width:0;white-space:normal;line-height:1.35;}
  .episode-row .echeck{
    width:34px;height:34px;border-radius:50%;border:none;background:var(--surface-2);flex-shrink:0;cursor:pointer;
    display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:16px;
  }
  .episode-row .echeck.done{background:var(--teal);color:#fff;}
  .action-row{display:flex;gap:8px;margin-top:18px;}
  .danger-link{color:var(--danger);font-size:13px;text-align:center;margin-top:20px;cursor:pointer;text-decoration:underline;}
  .search-box{
    display:flex;gap:8px;margin-bottom:16px;position:sticky;top:70px;background:var(--bg);padding-bottom:8px;z-index:10;
  }
  .search-box input{
    flex:1;padding:12px 14px;border-radius:999px;border:1px solid var(--line);background:var(--surface);font-size:16px;
  }
  .result-row{
    display:flex;gap:12px;background:var(--surface);border-radius:14px;padding:10px;margin-bottom:10px;
    box-shadow:var(--shadow);align-items:center;cursor:pointer;
  }
  .result-row img{width:52px;height:74px;object-fit:cover;border-radius:8px;background:var(--surface-2);}
  .result-row .rname{font-weight:700;font-size:14.5px;}
  .result-row .rmeta{font-size:12px;color:var(--ink-soft);}
  .import-drop{
    border:2px dashed var(--line);border-radius:var(--radius-lg);padding:36px 20px;text-align:center;
    color:var(--ink-soft);cursor:pointer;background:var(--surface);
  }
  .progress-bar{height:8px;border-radius:999px;background:var(--surface-2);overflow:hidden;margin:14px 0;}
  .progress-bar .fill{height:100%;background:var(--gold);transition:width .2s;}
  .review-card{background:var(--surface);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);}
  .review-card .rtitle{font-weight:700;margin-bottom:4px;}
  .review-card .rreason{font-size:12.5px;color:var(--ink-soft);margin-bottom:10px;}
  .review-card select, .review-card input{
    width:100%;padding:9px;border-radius:8px;border:1px solid var(--line);margin-bottom:8px;font-size:16px;
  }
  .toast{
    position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:13.5px;
    z-index:100;opacity:0;transition:opacity .2s;pointer-events:none;
  }
  .toast.show{opacity:1;}
  .spinner{
    width:22px;height:22px;border-radius:50%;border:3px solid var(--surface-2);border-top-color:var(--accent);
    animation:spin .7s linear infinite;margin:20px auto;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  ::-webkit-scrollbar{width:0;height:0;}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}
</style>

<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://zimbmlxmjrsfcnqpjsqc.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_cLQb-5Bq-vJeKNgQ8s7sgA_J73S0X2T';
const AUTH_EMAIL = 'agus_mllobet@hotmail.com';
const TVMAZE = 'https://api.tvmaze.com';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const STATUS_LABELS = {
  watching: 'Viendo',
  paused: 'Pausada',
  dropped: 'Abandonada',
  completed: 'Completada'
};

let state = {
  view: 'loading',
  user: null,
  shows: [],
  episodeCache: {},
  watchedMap: {},
  currentShowId: null,
  libraryFilter: 'all',
  libraryQuery: '',
  watchlistTab: 'list',
  importData: null,
};

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove('show'), 2400);
}

async function tvmazeLookupByTvdb(thetvdbId){
  try{
    const r = await fetch(`${TVMAZE}/lookup/shows?thetvdb=${thetvdbId}`);
    if(r.status === 404) return null;
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}

async function tvmazeSearch(query){
  const r = await fetch(`${TVMAZE}/search/shows?q=${encodeURIComponent(query)}`);
  if(!r.ok) return [];
  const data = await r.json();
  return data.map(d => d.show);
}

async function tvmazeEpisodes(showId){
  const r = await fetch(`${TVMAZE}/shows/${showId}/episodes?specials=1`);
  if(!r.ok) return [];
  const eps = await r.json();
  eps.sort((a,b)=>{
    const da = a.airstamp ? new Date(a.airstamp).getTime() : null;
    const db_ = b.airstamp ? new Date(b.airstamp).getTime() : null;
    if(da && db_) return da - db_;
    if(a.season !== b.season) return a.season - b.season;
    return a.number - b.number;
  });
  return eps;
}

function todayISO(){ return new Date().toISOString().slice(0,10); }

async function loadShows(){
  const { data, error } = await supabase.from('tvagus_shows').select('*').order('name');
  if(error){ console.error(error); toast('Error cargando biblioteca'); return []; }
  return data;
}

async function loadWatched(showIds){
  if(showIds.length === 0) return {};
  const { data, error } = await supabase
    .from('tvagus_watched_episodes')
    .select('show_id, tvmaze_episode_id')
    .in('show_id', showIds);
  if(error){ console.error(error); return {}; }
  const map = {};
  for(const row of data){
    if(!map[row.show_id]) map[row.show_id] = new Set();
    map[row.show_id].add(row.tvmaze_episode_id);
  }
  return map;
}

async function loadEpisodeCache(showId, tvmazeId, forceRefresh=false){
  if(state.episodeCache[showId] && !forceRefresh) return state.episodeCache[showId];
  const { data } = await supabase.from('tvagus_episode_cache').select('*').eq('show_id', showId).maybeSingle();
  const dayMs = 1000*60*60*24;
  if(data && !forceRefresh && (Date.now() - new Date(data.fetched_at).getTime() < dayMs)){
    state.episodeCache[showId] = data.episodes;
    return data.episodes;
  }
  const eps = await tvmazeEpisodes(tvmazeId);
  await supabase.from('tvagus_episode_cache').upsert({
    show_id: showId, user_id: state.user.id, episodes: eps, fetched_at: new Date().toISOString()
  });
  state.episodeCache[showId] = eps;
  return eps;
}

async function refreshAllData(){
  state.shows = await loadShows();
  state.watchedMap = await loadWatched(state.shows.map(s=>s.id));
}

function nextEpisodeFor(show){
  const eps = state.episodeCache[show.id];
  if(!eps) return { loading: true };
  const watched = state.watchedMap[show.id] || new Set();
  const today = todayISO();
  const aired = eps.filter(e => e.airdate && e.airdate <= today);
  const pendingAired = aired.filter(e => !watched.has(e.id));
  const totalAired = aired.length;
  const watchedAiredCount = aired.filter(e => watched.has(e.id)).length;
  if(pendingAired.length === 0){
    return { upToDate:true, remaining:0, totalAired, watchedAiredCount };
  }
  const next = pendingAired[0];
  return { next, remaining: pendingAired.length - 1, totalAired, watchedAiredCount };
}

function lastWatchedTime(show){
  return new Date(show.updated_at || show.created_at).getTime();
}

function render(){
  const app = document.getElementById('app');
  if(state.view === 'loading'){
    app.innerHTML = `<div class="login-wrap"><div class="spinner"></div></div>`;
    return;
  }
  if(state.view === 'login'){
    app.innerHTML = renderLogin();
    bindLogin();
    return;
  }

  let body = '';
  if(state.view === 'watchlist') body = renderWatchList();
  else if(state.view === 'library') body = renderLibrary();
  else if(state.view === 'detail') body = renderDetail();
  else if(state.view === 'search') body = renderSearch();
  else if(state.view === 'import') body = renderImport();

  app.innerHTML = `
    <div class="topbar">
      <h1>TV agus!</h1>
      <button class="icon-btn" id="btn-refresh" title="Actualizar">↻</button>
    </div>
    <div class="content">${body}</div>
    ${renderBottomNav()}
  `;
  bindGlobal();
  if(state.view === 'watchlist') bindWatchList();
  if(state.view === 'library') bindLibrary();
  if(state.view === 'detail') bindDetail();
  if(state.view === 'search') bindSearch();
  if(state.view === 'import') bindImport();
}

function renderBottomNav(){
  const icoTv = `<svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 3l4 4 4-4"/></svg>`;
  const icoFolder = `<svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>`;
  const icoSearch = `<svg class="ic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>`;
  return `
  <div class="bottomnav">
    <button class="navbtn ${state.view==='watchlist'?'active':''}" data-nav="watchlist">${icoTv}Watch List</button>
    <button class="navbtn ${state.view==='library'?'active':''}" data-nav="library">${icoFolder}Mis series</button>
    <button class="navbtn ${state.view==='search'?'active':''}" data-nav="search">${icoSearch}Buscar</button>
  </div>`;
}

function bindGlobal(){
  document.querySelectorAll('[data-nav]').forEach(b=>{
    b.onclick = ()=>{ state.view = b.dataset.nav; render(); };
  });
  const refreshBtn = document.getElementById('btn-refresh');
  if(refreshBtn) refreshBtn.onclick = ()=>{ location.href = location.pathname + '?t=' + Date.now(); };
}

function renderLogin(){
  return `
  <div class="login-wrap">
    <div class="display">TV agus!</div>
    <div class="sub">Ingresá tu PIN</div>
    <input type="password" inputmode="numeric" maxlength="6" class="pin-input" id="pin-field" placeholder="••••••" autofocus autocomplete="off" />
    <div class="error-text" id="pin-error"></div>
    <button class="primary-btn" id="pin-submit">Entrar</button>
  </div>`;
}

function bindLogin(){
  const field = document.getElementById('pin-field');
  const err = document.getElementById('pin-error');
  const submit = document.getElementById('pin-submit');
  field.focus();
  setTimeout(()=>field.focus(), 60);
  async function doLogin(){
    const pin = field.value.trim();
    if(!pin){ return; }
    submit.disabled = true; submit.textContent = 'Entrando...';
    const { data, error } = await supabase.auth.signInWithPassword({ email: AUTH_EMAIL, password: pin });
    submit.disabled = false; submit.textContent = 'Entrar';
    if(error){
      err.textContent = 'PIN incorrecto';
      return;
    }
    state.user = data.user;
    await afterLogin();
  }
  submit.onclick = doLogin;
  field.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
}

async function afterLogin(){
  state.view = 'loading'; render();
  await refreshAllData();
  state.view = 'watchlist';
  render();
  preloadEpisodeCaches();
}

async function preloadEpisodeCaches(){
  for(const show of state.shows){
    if(show.status === 'watching' || show.status === 'paused'){
      await loadEpisodeCache(show.id, show.tvmaze_id);
      if(state.view === 'watchlist') render();
    }
  }
}

function renderWatchList(){
  const tabsHtml = `
    <div class="toptabs">
      <button class="toptab ${state.watchlistTab!=='upcoming'?'active':''}" data-wtab="list">Watch List</button>
      <button class="toptab ${state.watchlistTab==='upcoming'?'active':''}" data-wtab="upcoming">Upcoming</button>
    </div>`;

  if(state.watchlistTab === 'upcoming'){
    return tabsHtml + renderUpcomingTab();
  }

  const active = state.shows.filter(s => ['watching','paused'].includes(s.status));
  if(active.length === 0){
    return tabsHtml + `<div class="empty-state"><div class="display">Tu cartelera está vacía</div>
      <p>Agregá series desde "Buscar" o importá tu historial de TV Time.</p>
      <button class="primary-btn" data-nav="search" style="margin-top:10px;">Buscar series</button>
      <div style="margin-top:14px;"><button class="ghost-btn" data-nav="import">Importar de TV Time</button></div>
    </div>`;
  }

  const withNext = [];
  const loadingShows = [];
  for(const s of active){
    const info = nextEpisodeFor(s);
    if(info.loading){ loadingShows.push(s); continue; }
    if(info.upToDate) continue;
    withNext.push({ show: s, info });
  }

  const recentThreshold = Date.now() - 1000*60*60*24*30;
  const seguir = withNext.filter(x => lastWatchedTime(x.show) >= recentThreshold);
  const haceTiempo = withNext.filter(x => lastWatchedTime(x.show) < recentThreshold);

  function ticket({show, info}){
    const ep = info.next;
    const code = `S${String(ep.season).padStart(2,'0')} | E${String(ep.number||0).padStart(2,'0')}`;
    const isPremiere = ep.number === 1;
    return `
    <div class="ticket" data-show="${show.id}">
      ${show.image_url ? `<img class="poster" src="${show.image_url}"/>` : `<div class="poster-ph">sin imagen</div>`}
      <div class="body">
        <div class="name-pill"><span>${escapeHtml(show.name)}</span> ›</div>
        <div class="ep-code">${code}${info.remaining>0? ' <span style=\"color:var(--ink-soft);font-weight:600;\">+'+info.remaining+'</span>':''}</div>
        <div class="ep-title">${escapeHtml(ep.name || 'Episodio')}</div>
        ${isPremiere ? `<div class="premiere-tag">PREMIERE</div>` : ''}
      </div>
      <div class="check" data-mark-episode="${show.id}:${ep.id}:${ep.season}:${ep.number}" title="Marcar como visto">✓</div>
    </div>`;
  }

  let html = '';
  if(seguir.length){
    html += `<div class="marquee-label"><span>Seguir viendo</span></div>` + seguir.map(ticket).join('');
  }
  if(haceTiempo.length){
    html += `<div class="marquee-label"><span>Hace tiempo no ves</span></div>` + haceTiempo.map(ticket).join('');
  }
  if(loadingShows.length){
    html += `<div class="spinner"></div>`;
  }
  if(!html && !loadingShows.length){
    html = `<div class="empty-state"><div class="display">¡Estás al día!</div><p>No tenés episodios pendientes por ahora.</p></div>`;
  }
  return tabsHtml + (html || `<div class="spinner"></div>`);
}

function renderUpcomingTab(){
  const active = state.shows.filter(s => ['watching','paused'].includes(s.status));
  const upcoming = [];
  for(const s of active){
    const eps = state.episodeCache[s.id];
    if(!eps) continue;
    const today = todayISO();
    const future = eps.filter(e => e.airdate && e.airdate > today).sort((a,b)=> a.airdate.localeCompare(b.airdate));
    if(future.length) upcoming.push({ show: s, ep: future[0] });
  }
  upcoming.sort((a,b)=> a.ep.airdate.localeCompare(b.ep.airdate));
  if(upcoming.length === 0){
    return `<div class="empty-state"><div class="display">Sin estrenos a la vista</div><p>Cuando haya fecha confirmada para un próximo episodio, aparece acá.</p></div>`;
  }
  return upcoming.map(({show, ep})=>{
    const code = `S${String(ep.season).padStart(2,'0')} | E${String(ep.number||0).padStart(2,'0')}`;
    const dateLabel = new Date(ep.airdate+'T00:00:00').toLocaleDateString('es-AR', { day:'numeric', month:'short' });
    return `
    <div class="ticket" data-show="${show.id}">
      ${show.image_url ? `<img class="poster" src="${show.image_url}"/>` : `<div class="poster-ph">sin imagen</div>`}
      <div class="body">
        <div class="name-pill"><span>${escapeHtml(show.name)}</span> ›</div>
        <div class="ep-code">${code}</div>
        <div class="ep-title">${escapeHtml(ep.name || 'Episodio')} · estrena ${dateLabel}</div>
      </div>
    </div>`;
  }).join('');
}

async function markEpisodeWatched(showId, tvmazeEpisodeId, seasonNumber=null, episodeNumber=null){
  if(!state.watchedMap[showId]) state.watchedMap[showId] = new Set();
  if(state.watchedMap[showId].has(tvmazeEpisodeId)){
    state.watchedMap[showId].delete(tvmazeEpisodeId);
    await supabase.from('tvagus_watched_episodes').delete()
      .eq('show_id', showId).eq('tvmaze_episode_id', tvmazeEpisodeId);
  } else {
    state.watchedMap[showId].add(tvmazeEpisodeId);
    await supabase.from('tvagus_watched_episodes').insert({
      show_id: showId, user_id: state.user.id, tvmaze_episode_id: tvmazeEpisodeId,
      season_number: seasonNumber, episode_number: episodeNumber
    });
  }
  await supabase.from('tvagus_shows').update({ updated_at: new Date().toISOString() }).eq('id', showId);
  const s = state.shows.find(s=>s.id===showId);
  if(s) s.updated_at = new Date().toISOString();
}

function renderLibrary(){
  const filters = ['all','watching','paused','dropped','completed'];
  const filterLabel = { all:'Todas', ...STATUS_LABELS };
  let shown = state.libraryFilter === 'all' ? state.shows : state.shows.filter(s=>s.status===state.libraryFilter);
  const q = (state.libraryQuery||'').trim().toLowerCase();
  if(q) shown = shown.filter(s => s.name.toLowerCase().includes(q));

  const chips = filters.map(f=>`<button class="chip ${state.libraryFilter===f?'active':''}" data-filter="${f}">${filterLabel[f]}</button>`).join('');
  const searchBox = `<div class="search-box" style="position:static;padding-bottom:0;"><input type="text" id="library-search" placeholder="Buscar en mis series..." value="${escapeHtml(state.libraryQuery||'')}" /></div>`;

  if(state.shows.length === 0){
    return `<div class="filter-row">${chips}</div><div class="empty-state"><div class="display">Todavía no agregaste series</div></div>`;
  }

  const cards = shown.map(s=>`
    <div class="grid-card" data-show="${s.id}">
      ${s.image_url ? `<img src="${s.image_url}" alt="${escapeHtml(s.name)}"/>` : `<div class="no-img">${escapeHtml(s.name)}</div>`}
      <div class="statusbar st-${gridColorFor(s)}"></div>
    </div>
  `).join('');

  return `${searchBox}<div class="filter-row">${chips}</div><div class="grid">${cards}</div>`;
}

function gridColorFor(show){
  if(show.status === 'dropped') return 'red';
  if(show.status === 'completed') return 'purple';
  if(show.status === 'paused') return 'gray';
  const info = nextEpisodeFor(show);
  if(info.loading) return 'gray';
  return info.upToDate ? 'green' : 'yellow';
}

let openSeasons = new Set();

function renderDetail(){
  const show = state.shows.find(s=>s.id===state.currentShowId);
  if(!show) return `<p>No encontrada.</p>`;
  const eps = state.episodeCache[show.id];

  if(!eps){
    loadEpisodeCache(show.id, show.tvmaze_id).then(()=>{ if(state.view==='detail') render(); });
    return `<button class="back-chevron" data-back>‹</button><div class="spinner"></div>`;
  }

  const watched = state.watchedMap[show.id] || new Set();
  const seasons = {};
  for(const e of eps){
    const key = e.season;
    if(!seasons[key]) seasons[key] = [];
    seasons[key].push(e);
  }
  const seasonKeys = Object.keys(seasons).map(Number).sort((a,b)=>a-b);

  const statusOptions = Object.entries(STATUS_LABELS).map(([v,l])=>
    `<option value="${v}" ${show.status===v?'selected':''}>${l}</option>`).join('');

  let seasonsHtml = seasonKeys.map(sk=>{
    const list = seasons[sk];
    const watchedCount = list.filter(e=>watched.has(e.id)).length;
    const complete = watchedCount === list.length;
    const label = sk === 0 ? 'Specials' : `Season ${sk}`;
    const isOpen = openSeasons.has(sk);
    let episodesHtml = '';
    if(isOpen){
      episodesHtml = list.map(e=>{
        const done = watched.has(e.id);
        const code = sk===0 ? `SP${String(e.number||0).padStart(2,'0')}` : `S${String(sk).padStart(2,'0')} | E${String(e.number||0).padStart(2,'0')}`;
        return `<div class="episode-row">
          ${e.image?.medium ? `<img src="${e.image.medium}"/>` : ''}
          <div class="ecode">${code}</div>
          <div class="etitle">${escapeHtml(e.name||'Episodio')}</div>
          <div class="echeck ${done?'done':''}" data-ep-toggle="${e.id}:${sk}:${e.number}">✓</div>
        </div>`;
      }).join('');
    }
    return `
    <div style="margin-bottom:10px;">
      <div class="season-card" style="background:var(--surface);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;">
        <div class="season-row ${complete?'complete':''}" data-season-toggle="${sk}">
          <div class="left">${label} <span class="count">${watchedCount}/${list.length}</span></div>
          <button class="mark-all" data-mark-season="${sk}" title="${complete? 'Desmarcar todo':'Marcar todo'}">✓</button>
        </div>
        <div class="season-progress"><div class="fill" style="width:${list.length? Math.round(watchedCount/list.length*100):0}%"></div></div>
        ${episodesHtml}
      </div>
    </div>`;
  }).join('');

  const totalEpisodes = eps.length;
  const totalWatched = eps.filter(e=>watched.has(e.id)).length;

  return `
    <div class="detail-hero" style="background-image:url('${show.image_url||''}')">
      <button class="back-chevron" data-back style="position:absolute;top:14px;left:4px;color:#fff;z-index:2;">‹</button>
      <div class="info">
        <h2>${escapeHtml(show.name)}</h2>
        <div class="meta">${seasonKeys.length} temporada${seasonKeys.length!==1?'s':''}${show.network? ' · '+escapeHtml(show.network):''}</div>
      </div>
    </div>
    <div class="overall-progress"><div class="fill" style="width:${totalEpisodes? Math.round(totalWatched/totalEpisodes*100):0}%"></div></div>
    <select class="status-select" id="status-select">${statusOptions}</select>
    <button class="ghost-btn" id="mark-previous" style="width:100%;margin-bottom:14px;">Marcar todos los anteriores como vistos</button>
    ${seasonsHtml}
    <div class="danger-link" id="remove-show">Quitar esta serie de mi biblioteca</div>
  `;
}

function bindDetail(){
  document.querySelector('[data-back]').onclick = ()=>{ state.view = state._detailFrom || 'watchlist'; render(); };
  const show = state.shows.find(s=>s.id===state.currentShowId);

  document.querySelectorAll('[data-season-toggle]').forEach(el=>{
    el.onclick = ()=>{
      const sk = parseInt(el.dataset.seasonToggle);
      if(openSeasons.has(sk)) openSeasons.delete(sk); else openSeasons.add(sk);
      render();
    };
  });

  document.querySelectorAll('[data-mark-season]').forEach(el=>{
    el.onclick = async (e)=>{
      e.stopPropagation();
      const sk = parseInt(el.dataset.markSeason);
      const eps = state.episodeCache[show.id].filter(ep=>ep.season===sk);
      const watched = state.watchedMap[show.id] || new Set();
      const allDone = eps.every(ep=>watched.has(ep.id));
      for(const ep of eps){
        if(allDone){ await markEpisodeWatched(show.id, ep.id); }
        else if(!watched.has(ep.id)){ await markEpisodeWatched(show.id, ep.id, ep.season, ep.number); }
      }
      render();
    };
  });

  document.querySelectorAll('[data-ep-toggle]').forEach(el=>{
    el.onclick = async ()=>{
      const [id, season, number] = el.dataset.epToggle.split(':');
      await markEpisodeWatched(show.id, parseInt(id), parseInt(season), parseInt(number));
      render();
    };
  });

  document.getElementById('mark-previous').onclick = async ()=>{
    const eps = state.episodeCache[show.id];
    const today = todayISO();
    const aired = eps.filter(e=>e.airdate && e.airdate<=today);
    const watched = state.watchedMap[show.id] || new Set();
    const firstPendingIdx = aired.findIndex(e=>!watched.has(e.id));
    if(firstPendingIdx === -1){ toast('Ya estás al día'); return; }
    for(let i=0;i<=firstPendingIdx;i++){
      const e = aired[i];
      if(!watched.has(e.id)) await markEpisodeWatched(show.id, e.id, e.season, e.number);
    }
    render();
    toast('Marcados como vistos');
  };

  document.getElementById('status-select').onchange = async (e)=>{
    const newStatus = e.target.value;
    await supabase.from('tvagus_shows').update({ status:newStatus, updated_at:new Date().toISOString() }).eq('id', show.id);
    show.status = newStatus;
    toast('Estado actualizado');
  };

  document.getElementById('remove-show').onclick = async ()=>{
    if(!confirm(`¿Quitar "${show.name}" de tu biblioteca? Se borra tu progreso de esta serie.`)) return;
    await supabase.from('tvagus_shows').delete().eq('id', show.id);
    state.shows = state.shows.filter(s=>s.id!==show.id);
    state.view = 'library'; render();
    toast('Serie eliminada');
  };
}

function renderSearchPreviewModal(){

          <div style="color:var(--ink-soft);font-size:13px;margin-top:4px;">${seasonsCount!=null ? seasonsCount+' temporada'+(seasonsCount!==1?'s':'') : 'Cargando...'}</div>

      </div>

async function addShowFlow(ds){
  const already = state.shows.find(s=>s.tvmaze_id === parseInt(ds.add));
  if(already){ toast('Ya está en tu biblioteca'); return; }
  const { data, error } = await supabase.from('tvagus_shows').insert({
    user_id: state.user.id,
    tvmaze_id: parseInt(ds.add),
    name: ds.name,
    image_url: ds.img || null,
    network: ds.network || null,
    premiered: ds.premiered || null,
    status: 'watching'
  }).select().single();
  if(error){ toast('Error al agregar'); console.error(error); return; }
  state.shows.push(data);
  toast(`${ds.name} agregada`);
  state.currentShowId = data.id;
  state._detailFrom = 'search';
  state.view = 'detail';
  render();
}

async function runImport(file){
  const progressEl = document.getElementById('import-progress');
  const dropZone = document.getElementById('drop-zone');
  dropZone.style.display = 'none';
  progressEl.innerHTML = `<p>Leyendo archivo...</p><div class="progress-bar"><div class="fill" style="width:0%"></div></div>`;
  const setProgress = (pct, label) => {
    progressEl.querySelector('.fill').style.width = pct+'%';
    let lbl = progressEl.querySelector('.plabel');
    if(!lbl){ lbl = document.createElement('p'); lbl.className='plabel'; progressEl.appendChild(lbl); }
    lbl.textContent = label;
  };

  const zip = await JSZip.loadAsync(file);
  async function readCSV(name){
    const f = zip.file(name);
    if(!f) return [];
    const text = await f.async('text');
    return Papa.parse(text, { header:true, skipEmptyLines:true }).data;
  }

  const followed = await readCSV('followed_tv_show.csv');
  const userShowData = await readCSV('user_tv_show_data.csv');
  const tracking = await readCSV('tracking-prod-records.csv');
  const specialStatus = await readCSV('user_show_special_status.csv');

  const followedMap = {};
  for(const row of followed){
    if(!row.tv_show_id) continue;
    followedMap[row.tv_show_id] = { active: row.active==='1', archived: row.archived==='1', name: row.tv_show_name };
  }
  const episodesSeenMap = {};
  for(const row of userShowData){
    if(!row.tv_show_id) continue;
    episodesSeenMap[row.tv_show_id] = { name: row.tv_show_name, nb: parseInt(row.nb_episodes_seen)||0 };
  }
  const lastEpMap = {};
  for(const row of tracking){
    if(row.type === 'last-episode-watched' && row.series_id){
      lastEpMap[row.series_id] = { season: parseInt(row.season_number), episode: parseInt(row.episode_number) };
    }
  }
  const specialMap = {};
  for(const row of specialStatus){
    if(!row.tv_show_id) continue;
    specialMap[row.tv_show_id] = row.status;
  }

  const allIds = new Set([...Object.keys(followedMap), ...Object.keys(episodesSeenMap)]);
  const idsArr = Array.from(allIds);
  const reviewQueue = [];
  let done = 0;

  async function processId(tvTimeId){
    const name = followedMap[tvTimeId]?.name || episodesSeenMap[tvTimeId]?.name || `ID ${tvTimeId}`;
    const nb = episodesSeenMap[tvTimeId]?.nb || 0;
    const followedInfo = followedMap[tvTimeId];
    const special = specialMap[tvTimeId];
    const lastEp = lastEpMap[tvTimeId];

    let suggestedStatus = 'watching';
    let needsReview = false;
    if(special === 'for_later'){
      suggestedStatus = 'watching';
    } else if(followedInfo && followedInfo.active && !followedInfo.archived){
      suggestedStatus = 'watching';
    } else if(followedInfo && (!followedInfo.active || followedInfo.archived) && nb > 0){
      needsReview = true;
    } else if(nb === 0){
      suggestedStatus = 'watching';
    } else if(!followedInfo && nb > 0){
      needsReview = true;
    }

    const tvmazeShow = await tvmazeLookupByTvdb(tvTimeId);
    if(!tvmazeShow){
      reviewQueue.push({
        reason:'not_found', tv_time_show_name:name, tv_time_show_id:parseInt(tvTimeId),
        episodes_seen:nb, last_season:lastEp?.season||null, last_episode:lastEp?.episode||null,
        suggested_status: suggestedStatus
      });
      return;
    }

    const eps = await tvmazeEpisodes(tvmazeShow.id);
    let watchedIds = [];
    if(lastEp && lastEp.season != null){
      watchedIds = eps.filter(e => e.season < lastEp.season || (e.season===lastEp.season && e.number<=lastEp.episode)).map(e=>e.id);
    } else if(nb > 0){
      const regular = eps.filter(e=>e.season>0);
      watchedIds = regular.slice(0, nb).map(e=>e.id);
    }

    const { data: insertedShow, error } = await supabase.from('tvagus_shows').insert({
      user_id: state.user.id,
      tvmaze_id: tvmazeShow.id,
      thetvdb_id: parseInt(tvTimeId),
      name: tvmazeShow.name,
      image_url: tvmazeShow.image?.medium || null,
      network: tvmazeShow.network?.name || tvmazeShow.webChannel?.name || null,
      premiered: tvmazeShow.premiered || null,
      status: needsReview ? 'paused' : suggestedStatus
    }).select().single();

    if(error || !insertedShow) return;

    await supabase.from('tvagus_episode_cache').upsert({
      show_id: insertedShow.id, user_id: state.user.id, episodes: eps, fetched_at: new Date().toISOString()
    });

    if(watchedIds.length){
      const rows = watchedIds.map(id=>{
        const ep = eps.find(e=>e.id===id);
        return { show_id: insertedShow.id, user_id: state.user.id, tvmaze_episode_id: id, season_number: ep?.season, episode_number: ep?.number };
      });
      for(let i=0;i<rows.length;i+=200){
        await supabase.from('tvagus_watched_episodes').insert(rows.slice(i,i+200));
      }
    }

    if(needsReview){
      reviewQueue.push({
        reason:'status_unclear', tv_time_show_name:tvmazeShow.name, tv_time_show_id:parseInt(tvTimeId),
        episodes_seen:nb, last_season:lastEp?.season||null, last_episode:lastEp?.episode||null,
        suggested_status:'dropped', resolved_tvmaze_id: tvmazeShow.id
      });
    }
  }

  const CONCURRENCY = 4;
  let idx = 0;
  async function worker(){
    while(idx < idsArr.length){
      const myIdx = idx++;
      await processId(idsArr[myIdx]);
      done++;
      setProgress(Math.round(done/idsArr.length*100), `Importando ${done}/${idsArr.length}...`);
    }
  }
  await Promise.all(Array.from({length:CONCURRENCY}, worker));

  if(reviewQueue.length){
    for(let i=0;i<reviewQueue.length;i+=200){
      await supabase.from('tvagus_import_review').insert(
        reviewQueue.slice(i,i+200).map(r=>({ ...r, user_id: state.user.id }))
      );
    }
  }

  await refreshAllData();
  state.importData = { reviewQueue: await loadReviewQueue() };
  render();
}

async function loadReviewQueue(){
  const { data } = await supabase.from('tvagus_import_review').select('*').eq('resolved', false).order('tv_time_show_name');
  return data || [];
}

function renderImportReview(){
  const items = state.importData.reviewQueue;
  if(items.length === 0){
    return `<div class="empty-state"><div class="display">¡Import completo!</div>
      <p>Ya podés ver tu biblioteca.</p>
      <button class="primary-btn" data-nav="watchlist" style="margin-top:12px;">Ir a mi Watch List</button></div>`;
  }
  return `
    <h2 style="margin-bottom:6px;">Revisar ${items.length} series</h2>
    <p style="color:var(--ink-soft);font-size:13.5px;margin-bottom:16px;">Algunas series necesitan que confirmes algo a mano.</p>
    ${items.map(it=>`
      <div class="review-card" data-review-id="${it.id}">
        <div class="rtitle">${escapeHtml(it.tv_time_show_name)}</div>
        <div class="rreason">${it.reason==='not_found' ? 'No la encontramos en TVMaze automáticamente. Buscala:' : `Vista pero no seguida en TV Time (${it.episodes_seen} episodios vistos). Elegí un estado:`}</div>
        ${it.reason==='not_found' ? `
          <input type="text" placeholder="Buscar serie..." class="review-search" data-review-search="${it.id}" />
          <div class="review-results" data-review-results="${it.id}"></div>
        ` : `
          <select class="review-status" data-review-status="${it.id}">
            <option value="watching">Viendo</option>
            <option value="paused">Pausada</option>
            <option value="dropped" selected>Abandonada</option>
            <option value="completed">Completada</option>
          </select>
          <button class="primary-btn" data-resolve-status="${it.id}" style="width:100%;">Confirmar</button>
        `}
      </div>
    `).join('')}
  `;
}

function bindImportReviewIfPresent(){
  document.querySelectorAll('[data-nav]').forEach(b=>{ b.onclick = ()=>{ state.view=b.dataset.nav; render(); }; });

  document.querySelectorAll('[data-review-search]').forEach(el=>{
    let t;
    el.addEventListener('input', ()=>{
      clearTimeout(t);
      const q = el.value.trim();
      const resultsEl = document.querySelector(`[data-review-results="${el.dataset.reviewSearch}"]`);
      if(q.length<2){ resultsEl.innerHTML=''; return; }
      t = setTimeout(async ()=>{
        const shows = await tvmazeSearch(q);
        resultsEl.innerHTML = shows.slice(0,5).map(s=>`
          <div class="result-row" data-review-pick="${el.dataset.reviewSearch}" data-pick-id="${s.id}" data-pick-name="${escapeHtml(s.name)}" data-pick-img="${s.image?.medium||''}" data-pick-network="${escapeHtml(s.network?.name||'')}">
            <img src="${s.image?.medium||''}"/>
            <div><div class="rname">${escapeHtml(s.name)}</div><div class="rmeta">${s.premiered?s.premiered.slice(0,4):''}</div></div>
          </div>
        `).join('');
        document.querySelectorAll('[data-review-pick]').forEach(pk=>{
          pk.onclick = ()=>resolveNotFound(pk.dataset);
        });
      }, 400);
    });
  });

  document.querySelectorAll('[data-resolve-status]').forEach(el=>{
    el.onclick = ()=>resolveStatusUnclear(el.dataset.resolveStatus);
  });
}

async function resolveStatusUnclear(reviewId){
  const select = document.querySelector(`[data-review-status="${reviewId}"]`);
  const status = select.value;
  const item = state.importData.reviewQueue.find(r=>r.id===reviewId);
  if(item.resolved_tvmaze_id){
    const show = state.shows.find(s=>s.tvmaze_id === item.resolved_tvmaze_id);
    if(show){
      await supabase.from('tvagus_shows').update({ status }).eq('id', show.id);
      show.status = status;
    }
  }
  await supabase.from('tvagus_import_review').update({ resolved:true, resolved_status:status }).eq('id', reviewId);
  state.importData.reviewQueue = state.importData.reviewQueue.filter(r=>r.id!==reviewId);
  render();
  toast('Actualizado');
}

async function resolveNotFound(ds){
  const reviewId = ds.reviewPick;
  const item = state.importData.reviewQueue.find(r=>r.id===reviewId);
  const eps = await tvmazeEpisodes(parseInt(ds.pickId));
  const { data: show } = await supabase.from('tvagus_shows').insert({
    user_id: state.user.id, tvmaze_id: parseInt(ds.pickId), name: ds.pickName,
    image_url: ds.pickImg||null, network: ds.pickNetwork||null, status: item.suggested_status || 'watching'
  }).select().single();
  if(show){
    await supabase.from('tvagus_episode_cache').upsert({ show_id: show.id, user_id: state.user.id, episodes: eps, fetched_at:new Date().toISOString() });
    let watchedIds = [];
    if(item.last_season != null){
      watchedIds = eps.filter(e=>e.season<item.last_season || (e.season===item.last_season && e.number<=item.last_episode)).map(e=>e.id);
    } else if(item.episodes_seen>0){
      watchedIds = eps.filter(e=>e.season>0).slice(0,item.episodes_seen).map(e=>e.id);
    }
    if(watchedIds.length){
      const rows = watchedIds.map(id=>{ const ep=eps.find(e=>e.id===id); return { show_id:show.id, user_id:state.user.id, tvmaze_episode_id:id, season_number:ep?.season, episode_number:ep?.number }; });
      for(let i=0;i<rows.length;i+=200) await supabase.from('tvagus_watched_episodes').insert(rows.slice(i,i+200));
    }
    state.shows.push(show);
  }
  await supabase.from('tvagus_import_review').update({ resolved:true }).eq('id', reviewId);
  state.importData.reviewQueue = state.importData.reviewQueue.filter(r=>r.id!==reviewId);
  render();
  toast('Serie agregada');
}

async function exportMyData(){
  toast('Preparando export...');
  const [shows, watched, cache] = await Promise.all([
    supabase.from('tvagus_shows').select('*'),
    supabase.from('tvagus_watched_episodes').select('*'),
    supabase.from('tvagus_episode_cache').select('show_id, episodes')
  ]);
  const payload = {
    exported_at: new Date().toISOString(),
    shows: shows.data, watched_episodes: watched.data, episode_cache: cache.data
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `tv-agus-export-${todayISO()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function escapeHtml(str){
  if(!str) return '';
  return str.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function boot(){
  const { data: { session } } = await supabase.auth.getSession();
  if(session){
    state.user = session.user;
    await afterLogin();
  } else {
    state.view = 'login';
    render();
  }
}
boot();
</script>
